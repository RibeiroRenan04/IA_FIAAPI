services:
  - type: web
    name: simplificador-linguagem-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: OpenAI__ApiKey
        sync: false          # preenchido manualmente no dashboard da Render
      - key: OpenAI__Model
        value: gpt-4o-mini
      - key: Cors__Origins__0
        value: https://ia-fia.vercel.app
    healthCheckPath: /health
    autoDeploy: true
